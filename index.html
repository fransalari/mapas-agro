<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8" />

<title>Mapa Agro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

#map {
  width: 100vw;
  height: 100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-31.5, -63], 6);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: '&copy; OpenStreetMap'
  }
).addTo(map);

fetch('https://raw.githubusercontent.com/fransalari/mapas-agro/main/admin_boundaries_vf.json')
  .then(response => response.json())
  .then(data => {

    var geojsonLayer = L.geoJSON(data, {

      style: function(feature) {

        let tasa = Math.random();

        return {
          color: '#333',
          weight: 1,
          fillColor:
            tasa > 0.6 ? 'red' :
            tasa > 0.3 ? 'yellow' :
            'green',
          fillOpacity: 0.7
        };
      },

      onEachFeature: function(feature, layer) {

        layer.bindPopup(
          'ID: ' + (feature.properties.id || 'Sin ID')
        );

      }

    }).addTo(map);

    map.fitBounds(geojsonLayer.getBounds());

  });

</script>

</body>
</html>
